<!DOCTYPE html>
<html>
<head>
    <title>Cart - SYS STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cart.css">
</head>

<body>

    <header>
        <h1>🛒 SYS STORE CART</h1>
        <p>Review Your Selected Products</p>
    </header>

    <div class="cart-container">
        <h2 id="cart-count">Items in Cart: 0</h2>

        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Product</th>
                    <th style="text-align: right;">Price</th>
                </tr>
            </thead>
            <tbody id="cart-table-body">
                </tbody>
        </table>

        <div class="total-box" id="cart-total" style="font-weight: bold; font-size: 1.2em; margin: 20px 0;">
            Total Amount: ₹0
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; margin-bottom: 20px;">
            
            <button class="bill-btn" onclick="window.location.href='bill.html'" style="cursor: pointer; padding: 12px 20px; font-family: 'Poppins', sans-serif; width: 250px;">
                🧾 Generate Bill
            </button>
            
            <button class="bill-btn" onclick="window.location.href='index.html'" style="cursor: pointer; padding: 12px 20px; font-family: 'Poppins', sans-serif; width: 250px; opacity: 0.9;">
                🏠 Continue Shopping
            </button>

        </div>
    </div>
    
    <script>
        let cart = JSON.parse(localStorage.getItem('sysStoreCart')) || [];
        const tableBody = document.getElementById('cart-table-body');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');
        let total = 0;

        cartCount.innerText = `Items in Cart: ${cart.length}`;

        if(cart.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding: 20px;">Your cart is empty!</td></tr>';
        } else {
            cart.forEach((item, index) => {
                let row = `<tr>
                    <td style="text-align: left;">${item.name}</td>
                    <td style="text-align: right;">
                        ₹${item.price} 
                        <button onclick="removeItem(${index})" style="margin-left:10px; color:red; border:none; background:none; cursor:pointer; font-size: 16px;" title="Remove Item">❌</button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
                total += parseInt(item.price);
            });
        }

        cartTotal.innerText = `Total Amount: ₹${total}`;

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('sysStoreCart', JSON.stringify(cart));
            location.reload(); 
        }
    </script>

</body>
</html>
