<!DOCTYPE html>
<html>
<head>
    <title>Cart - SYS STORE</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="cart.css">
</head>

<body>

    <header>
        <h1>🛒 SYS STORE CART</h1>
        <p>Review Your Selected Products</p>
    </header>

    <div class="cart-container">
        <h2>Items in Cart: 3</h2>

        <table>

            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>

            <tr>
                <td>Onion</td>
                <td>2 Kg</td>
                <td>₹80</td>
            </tr>

            <tr>
                <td>Apple</td>
                <td>1 Kg</td>
                <td>₹120</td>
            </tr>

            <tr>
                <td>Sprite</td>
                <td>2</td>
                <td>₹80</td>
            </tr>

        </table>

        <div class="total-box">
            Total Amount: ₹280
        </div>

       <button class="bill-btn">
    🧾 Generate Bill
</button>
    </div>
    

</body>
</html>
