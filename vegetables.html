<!DOCTYPE html>
<html>
<head>
    <title>Vegetables - SYS STORE</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="vegetables.css">
</head>

<body>

    <header>
        <h1>🥕 VEGETABLES</h1>
        <p>Fresh vegetables at best prices</p>
    </header>

    <div class="products">

        <div class="product-card">
            <img src="images/onion.jpg" alt="Onion">
            <h3>Onion</h3>
            <p>₹40 / kg</p>

            <input type="number"
                   placeholder="Enter Kg"
                   min="1">

            <button>Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="images/tomato.jpg" alt="Tomato">
            <h3>Tomato</h3>
            <p>₹35 / kg</p>

            <input type="number"
                   placeholder="Enter Kg"
                   min="1">

            <button>Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="images/potato.jpg" alt="Potato">
            <h3>Potato</h3>
            <p>₹30 / kg</p>

            <input type="number"
                   placeholder="Enter Kg"
                   min="1">

            <button>Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="images/carrot.jpg" alt="Carrot">
            <h3>Carrot</h3>
            <p>₹50 / kg</p>

            <input type="number"
                   placeholder="Enter Kg"
                   min="1">

            <button>Add To Cart</button>
        </div>

    </div>

</body>
</html>
