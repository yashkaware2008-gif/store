<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chips - SYS STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chips.css">
</head>

<body>

    <header>
        <h1>🥔 CHIPS</h1>
        <p>Fresh Crunchy Chips</p>
    </header>

    <div class="products" style="margin-bottom: 80px;">

        <div class="product-card">
            <img src="images/cream.jpg" alt="Cream n Onion">
            <h3>Cream n Onion</h3>
            <p>₹40 / packet</p>
            <input type="number" id="qty-cream" placeholder="Quantity" min="1" value="1">
            <br>
            <button onclick="addToCart('Cream n Onion', 40, 'qty-cream', '🥔 Cream n Onion Chips added!')">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="images/tochip.jpg" alt="Tomato">
            <h3>Tomato</h3>
            <p>₹35 / packet</p>
            <input type="number" id="qty-tomato-chip" placeholder="Quantity" min="1" value="1">
            <br>
            <button onclick="addToCart('Tomato Chips', 35, 'qty-tomato-chip', '🍅 Tomato Chips added!')">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="images/chipes.jpg" alt="Salted">
            <h3>Salted</h3>
            <p>₹30 / packet</p>
            <input type="number" id="qty-salted" placeholder="Quantity" min="1" value="1">
            <br>
            <button onclick="addToCart('Salted Chips', 30, 'qty-salted', '🧂 Salted Chips added!')">Add To Cart</button>
        </div>

        <div class="product-card">
            <img src="images/paprika.jpg" alt="Paprika">
            <h3>Paprika</h3>
            <p>₹50 / packet</p>
            <input type="number" id="qty-paprika" placeholder="Quantity" min="1" value="1">
            <br>
            <button onclick="addToCart('Paprika Chips', 50, 'qty-paprika', '🌶️ Paprika Chips added!')">Add To Cart</button>
        </div>

    </div>

    <div id="toast" style="display: none; position: fixed; top: 30px; right: 30px; background: #ff9800; color: white; padding: 15px 30px; border-radius: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; font-family: 'Poppins', sans-serif; font-size: 16px;"></div>

    <div style="position: fixed; bottom: 0; left: 0; width: 100%; background: #ffb300; display: flex; justify-content: space-around; padding: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); z-index: 999;">
        <a href="index.html" style="text-decoration: none; color: black; font-weight: bold; font-family: 'Poppins';">🏠 Store Home</a>
        <a href="cart.html" style="text-decoration: none; color: black; font-weight: bold; font-family: 'Poppins';">🛒 View My Cart</a>
    </div>

    <script>
    function showToast(message) {
        var toast = document.getElementById("toast");
        toast.innerText = message;
        toast.style.display = "block";
        setTimeout(function() {
            toast.style.display = "none";
        }, 2500);
    }

    function addToCart(itemName, pricePerUnit, inputId, toastMessage) {
        let qty = document.getElementById(inputId).value;
        let finalPrice = pricePerUnit * qty;
        let displayName = `${itemName} (${qty}x)`;

        let cart = JSON.parse(localStorage.getItem('sysStoreCart')) || [];
        cart.push({ name: displayName, price: finalPrice });
        localStorage.setItem('sysStoreCart', JSON.stringify(cart));

        showToast(toastMessage);
    }
    </script>

</body>
</html>
