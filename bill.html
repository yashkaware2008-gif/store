<!DOCTYPE html>
<html>
<head>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill - SYS STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bill.css">
    <style>
        /* Optional: Basic styling for the new Clear Cart button to match your layout */
        .clear-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            margin-top: 10px;
        }
        .clear-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>

<body>

    <div class="bill-container">

        <h1>🧾 SYS STORE</h1>

        <p class="address">📍 Dhayari Gaon, Pune</p>

        <hr>

        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Item</th>
                    <th style="text-align: right;">Amount</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- JavaScript will automatically inject the cart items here -->
            </tbody>
        </table>

        <hr>

        <div class="total" id="grand-total" style="text-align: right; font-weight: bold; font-size: 1.2em;">
            Grand Total : ₹0
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button onclick="window.print()" style="padding: 10px 15px; font-family: 'Poppins', sans-serif; cursor: pointer;">
                🖨 Print Bill
            </button>
            
            <button onclick="clearCart()" class="clear-btn">
                🗑 Clear Cart
            </button>
        </div>

        <p class="thankyou" style="text-align: center; margin-top: 20px;">
            Thank You For Shopping With Us ❤️
        </p>

    </div>

    <script>
        // Load the cart from local storage
        const cart = JSON.parse(localStorage.getItem('sysStoreCart')) || [];
        const container = document.getElementById('cart-items');
        const totalDisplay = document.getElementById('grand-total');
        let total = 0;

        // Loop through each item in the cart and display it
        cart.forEach(item => {
            let row = `<tr>
                <td style="text-align: left;">${item.name}</td>
                <td style="text-align: right;">₹${item.price}</td>
            </tr>`;
            container.innerHTML += row;
            total += parseInt(item.price);
        });

        // Display the final calculated total
        totalDisplay.innerText = `Grand Total : ₹${total}`;

        // Function to clear the cart after printing/shopping
        function clearCart() {
            localStorage.removeItem('sysStoreCart');
            alert("Cart cleared!");
            location.reload(); // Refresh the page to show an empty bill
        }
    </script>

</body>
</html>
