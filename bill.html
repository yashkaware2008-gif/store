<!DOCTYPE html>
<html>
<head>
    <title>Bill - SYS STORE</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="bill.css">
</head>

<body>

    <div class="bill-container">

        <h1>🧾 SYS STORE</h1>

        <p class="address">📍 Dhayari Gaon, Pune</p>

        <hr>

        <table>

            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>

            <tr>
                <td>Onion</td>
                <td>2 Kg</td>
                <td>₹80</td>
            </tr>

            <tr>
                <td>Apple</td>
                <td>1 Kg</td>
                <td>₹120</td>
            </tr>

            <tr>
                <td>Sprite</td>
                <td>2</td>
                <td>₹80</td>
            </tr>

        </table>

        <hr>

        <div class="total">
            Grand Total : ₹280
        </div>

        <button onclick="window.print()">
            🖨 Print Bill
        </button>

        <p class="thankyou">
            Thank You For Shopping With Us ❤️
        </p>

    </div>

</body>
</html>
