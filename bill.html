<!DOCTYPE html>
<html>
<head>
    
    <title>Bill - SYS STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bill.css">
    <style>
        .clear-btn { 
            background-color: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-family: 'Poppins', sans-serif; 
        }
        .clear-btn:hover { 
            background-color: #cc0000; 
        }
        .home-btn {
            background-color: #ffb300;
            color: black;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
        }
        .home-btn:hover {
            background-color: #ffa000;
        }
        @media (max-width: 480px) {
            .bill-container { width: 95% !important; padding: 10px !important; }
        }
    </style>
</head>

<body>

    <div class="bill-container" style="max-width: 100%; margin: 10px auto;">

        <h1>🧾 SYS STORE</h1>
        <p class="address">📍 Dhayari Gaon, Pune</p>
        <hr>

        <table style="width: 100%;">
            <thead>
                <tr>
                    <th style="text-align: left;">Item</th>
                    <th style="text-align: right;">Amount</th>
                </tr>
            </thead>
            <tbody id="cart-items"></tbody>
        </table>

        <hr>

        <div class="total" id="grand-total" style="text-align: right; font-weight: bold; font-size: 1.2em;">
            Grand Total : ₹0
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
            <button onclick="window.print()" style="padding: 10px 15px; font-family: 'Poppins', sans-serif; cursor: pointer; border-radius: 5px; border: 1px solid #ccc;">
                🖨 Print Bill
            </button>
            
            <button onclick="clearCart()" class="clear-btn">
                🗑 Clear Cart
            </button>

            <button onclick="window.location.href='index.html'" class="home-btn">
                🏠 Back to Home
            </button>
        </div>

        <p class="thankyou" style="text-align: center; margin-top: 20px;">
            Thank You For Shopping With Us ❤️
        </p>

    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('sysStoreCart')) || [];
        const container = document.getElementById('cart-items');
        const totalDisplay = document.getElementById('grand-total');
        let total = 0;

        cart.forEach(item => {
            let row = `<tr>
                <td style="text-align: left;">${item.name}</td>
                <td style="text-align: right;">₹${item.price}</td>
            </tr>`;
            container.innerHTML += row;
            total += parseInt(item.price);
        });

        totalDisplay.innerText = `Grand Total : ₹${total}`;

        function clearCart() {
            localStorage.removeItem('sysStoreCart');
            alert("Cart cleared!");
            location.reload();
        }
    </script>

</body>
</html>
