<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>SYS STORE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Add this to style.css or keep here to ensure links work perfectly */
        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <div class="top">
            <div class="profile-icon">👤</div>
            <h1>SYS STORE</h1>
            <p>📍 Dhayari Gaon, Pune</p>
        </div>
        <input type="text" placeholder="Search Products...">
    </header>

    <section class="banner">
        <div class="welcome-row">
            <span class="bag">🛍️</span>
            <h1>WELCOME!</h1>
            <span class="bag">🛍️</span>
        </div>
        <div class="offer-container">
            <div class="offer-text">
                🔥 FLAT 50% OFF ON VEGETABLES • FREE DELIVERY ABOVE ₹299 • BUY 2 GET 1 FREE 🔥
            </div>
        </div>
    </section>

    <h2>Categories</h2>

    <div class="categories">
        <a href="vegetables.html" class="card-link">
            <div class="card">
                <img src="images/onion.jpg" alt="Vegetables">
                <h3 class="category-name">Vegetables</h3>
            </div>
        </a>

        <a href="fruit.html" class="card-link">
            <div class="card">
                <img src="images/apple.jpg" alt="Fruits">
                <h3 class="category-name">Fruits</h3>
            </div>
        </a>

        <a href="chips.html" class="card-link">
            <div class="card">
                <img src="images/chips.jpg" alt="Chips">
                <h3 class="category-name">Chips</h3>
            </div>
        </a>

        <a href="soda.html" class="card-link">
            <div class="card">
                <img src="images/sprite.jpg" alt="Soda">
                <h3 class="category-name">Soda</h3>
            </div>
        </a>
    </div> <div class="bottom-nav">
        <button>🏠 Home</button>
        <button>📂 Category</button>
        <button>🧾 Bill</button>
    </div>

</body>
</html>
